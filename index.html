<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>MICHAEL 808 DRUMS</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://unpkg.com/tone"></script>
<style>
	  
  body {
    background: #0a0a0a;
    color: #f0f0f0;
    font-family: monospace;
    min-height: 100vh;

    align-items: center;
    justify-content: center;
  }
h1 {
	font-size: 80px;
	margin-bottom: 30px;
}

#grid {
    display: grid;                          
    grid-template-columns: repeat(4, 140px);
    gap: 12px;
  }

.pad {
	height: 60px;
	background: #100;
	border: 2px solid #330;
	border-radius: 14 px;
	cursor: url('bull.png')
	display: flex;
	align-items: center;
	font-size: 20px;
	font-family: monospace;
	color: inherit;
	
.pad:active {
	transform: scale(0.92);
}
	label {
		margin-top: 15px;
		font-size: 20px;
		color: #555
	}
input[type=range]{
	width: 160px;
	margin-top: 16px;
}
</style>
</head>
</body>
	
<h1>MICHAELS 808 MACHINE</h1>
<div id="grid"></div>
<label>Volume</label>
<input type="range" id="volume" max="100" min="1" step="1">
	
<script>
	const pads = [
  { name: 'KICK',  key: 'Q', color: '#ff3c3c' }, // row 1
  { name: 'SNARE', key: 'W', color: '#ff9500' },
  { name: 'CLAP',  key: 'E', color: '#ffe600' },
  { name: 'TOM H', key: 'R', color: '#00e5ff' },
  { name: 'TOM L', key: 'A', color: '#a855f7' }, // row 2

]; 
</script>

</html>
